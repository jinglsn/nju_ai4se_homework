<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Agent Harness</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Consolas', 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
.header { background: #16213e; padding: 16px 24px; border-bottom: 1px solid #0f3460; }
.header h1 { font-size: 18px; color: #e94560; }
.controls { padding: 12px 24px; background: #16213e; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.controls input { background: #0f3460; border: 1px solid #533483; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; font-family: inherit; font-size: 14px; }
.controls input[type="text"] { flex: 1; min-width: 200px; }
.controls button { background: #e94560; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 14px; }
.controls button:disabled { background: #555; cursor: not-allowed; }
.controls button.secondary { background: #533483; }
.output { flex: 1; overflow-y: auto; padding: 16px 24px; }
.output .line { padding: 2px 0; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
.output .iteration { color: #e94560; font-weight: bold; margin-top: 8px; }
.output .tool { color: #53a8b6; }
.output .result { color: #a8a8a8; }
.output .feedback { color: #f0c040; }
.output .error { color: #e94560; }
.output .stop { color: #4ecca3; font-weight: bold; }
.output .hitl { background: #533483; padding: 8px 12px; border-radius: 4px; margin: 8px 0; }
.hitl button { margin-left: 8px; }
.status { padding: 8px 24px; background: #16213e; border-top: 1px solid #0f3460; font-size: 12px; color: #888; }
</style>
</head>
<body>
<div class="header"><h1>Web Agent Harness</h1></div>
<div class="controls">
  <input type="password" id="apiKey" placeholder="API Key (sk-...)" style="flex:2;">
  <button id="btnConnect" onclick="connect()">连接</button>
  <input type="text" id="task" placeholder="任务描述，如：fix the failing tests" style="flex:3;">
  <button id="btnRun" onclick="run()" disabled>执行</button>
  <button class="secondary" onclick="clearOutput()">清空</button>
</div>
<div class="output" id="output"></div>
<div class="status" id="status">状态: 未连接</div>

<script>
let sessionId = null;
let ws = null;

function appendLine(text, className) {
  const div = document.createElement('div');
  div.className = 'line ' + (className || '');
  div.textContent = text;
  document.getElementById('output').appendChild(div);
  document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
}

function setStatus(text) {
  document.getElementById('status').textContent = '状态: ' + text;
}

async function connect() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('请输入 API Key'); return; }
  try {
    const resp = await fetch('/api/session', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({api_key: apiKey}),
    });
    if (!resp.ok) { const err = await resp.json(); alert(err.detail); return; }
    const data = await resp.json();
    sessionId = data.session_id;
    document.getElementById('btnRun').disabled = false;
    document.getElementById('btnConnect').disabled = true;

    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}/ws/${sessionId}`);
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.status === 'resolved') {
        appendLine(`  HITL: ${msg.approved ? '已允许' : '已拒绝'}`, msg.approved ? 'stop' : 'error');
      }
    };
    ws.onclose = () => { setStatus('WebSocket 断开'); };

    setStatus(`已连接 (会话: ${sessionId})`);
    appendLine('> 会话已创建，可以输入任务执行', 'stop');
  } catch (e) {
    alert('连接失败: ' + e.message);
  }
}

async function run() {
  const task = document.getElementById('task').value.trim();
  if (!task) { alert('请输入任务描述'); return; }
  document.getElementById('btnRun').disabled = true;
  appendLine(`\n> 任务: ${task}`, 'iteration');
  setStatus('执行中...');

  try {
    const resp = await fetch(`/api/session/${sessionId}/stream?task=${encodeURIComponent(task)}`);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') { appendLine('> 执行完成', 'stop'); break; }
        try {
          const event = JSON.parse(data);
          handleEvent(event);
        } catch (e) {}
      }
    }
  } catch (e) {
    appendLine('> 错误: ' + e.message, 'error');
  }
  document.getElementById('btnRun').disabled = false;
  setStatus(`已连接 (会话: ${sessionId})`);
}

function handleEvent(event) {
  switch (event.type) {
    case 'iteration':
      appendLine(`\n--- 第 ${event.iteration} 轮 ---`, 'iteration');
      break;
    case 'llm_response':
      if (event.text) appendLine(`> LLM: ${event.text}`, '');
      if (event.tool_calls) {
        for (const tc of event.tool_calls) {
          appendLine(`> 调用工具: ${tc.name}(${JSON.stringify(tc.args)})`, 'tool');
        }
      }
      break;
    case 'tool_start':
      appendLine(`> 执行: ${event.tool}`, 'tool');
      break;
    case 'tool_result':
      const ok = event.success ? '[OK]' : '[FAIL]';
      appendLine(`  ${ok} ${(event.output || '').substring(0, 300)}`, event.success ? 'result' : 'error');
      break;
    case 'feedback':
      appendLine(`  [反馈] ${event.test_result}: ${event.summary}`, 'feedback');
      break;
    case 'hitl_required':
      appendLine(`  ⚠ 危险操作: ${event.tool} — ${event.reason}`, 'hitl');
      showHitlDialog(event);
      break;
    case 'tool_denied':
      appendLine(`  ⚠ 操作被拒绝: ${event.tool}`, 'error');
      break;
    case 'stop':
      appendLine(`\n${event.success ? '✅' : '❌'} 停止: ${event.reason}`, 'stop');
      break;
    case 'error':
      appendLine(`> 错误: ${event.message}`, 'error');
      break;
  }
}

function showHitlDialog(event) {
  const container = document.getElementById('output');
  const div = document.createElement('div');
  div.className = 'hitl';
  div.innerHTML = `⚠ 危险操作: <b>${event.tool}</b> — ${event.reason}<br>
    <button onclick="approveHitl('${event.call_id}', true, this.parentElement)">允许</button>
    <button onclick="approveHitl('${event.call_id}', false, this.parentElement)">拒绝</button>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function approveHitl(callId, approved, element) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({action: 'resolve', call_id: callId, approved}));
  }
  element.innerHTML = approved ? '已允许' : '已拒绝';
}

function clearOutput() {
  document.getElementById('output').innerHTML = '';
}
</script>
</body>
</html>
